<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous" />
    <title>Calculator</title>
</head>

<body id="body">
    <div class="container">
        <div class="box">
            <div class="calculator">
                <p id="result">0</p>
                <hr />
                <div class="buttons">
                    <div class="fifth-line">
                        <button class="first-fifth" id="button">(</button>
                        <button class="second-fifth" id="button">)</button>
                        <button class="third-fifth" id="button">DEL</button>
                        <button class="fourth-fifth" id="button">C</button>
                    </div>
                    <div class="first-line">
                        <button class="first-first" id="button">7</button>
                        <button class="second-first" id="button">8</button>
                        <button class="third-first" id="button">9</button>
                        <button class="fourth-first" id="button">+</button>
                    </div>
                    <br />
                    <div class="second-line">
                        <button class="first-second" id="button">4</button>
                        <button class="second-second" id="button">5</button>
                        <button class="third-second" id="button">6</button>
                        <button class="fourth-second" id="button">-</button>
                    </div>
                    <br />
                    <div class="third-line">
                        <button class="first-third" id="button">1</button>
                        <button class="second-third" id="button">2</button>
                        <button class="third-third" id="button">3</button>
                        <button class="fourth-third" id="button">/</button>
                    </div>
                    <br />
                    <div class="fourth-line">
                        <button class="first-fourth" id="button">0</button>
                        <button class="second-fourth" id="button">.</button>
                        <button class="third-fourth" id="equal">=</button>
                        <button class="fourth-fourth" id="button">*</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="app.js"></script>

</html>
